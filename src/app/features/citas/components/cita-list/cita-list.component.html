<div class="glass-panel p-4">

  <h3 class="mb-3">Agenda de Citas</h3>

  <div *ngIf="citas.length === 0">
    No hay citas registradas
  </div>

  <div *ngFor="let cita of citas" class="glass-panel-hover p-3 mb-3">

    <div class="d-flex justify-between">
      <strong>{{ cita.mascota }}</strong>
      <span>{{ cita.estado }}</span>
    </div>

    <div>👤 {{ cita.dueno }}</div>
    <div>👨‍⚕️ {{ cita.veterinario }}</div>
    <div>📅 {{ cita.fecha }}</div>
    <div>⏰ {{ cita.hora }}</div>
    <div>📝 {{ cita.motivo }}</div>

    <button class="btn-secondary mt-2"
            (click)="eliminar.emit(cita.id)">
      Eliminar
    </button>

  </div>

</div>
