<header class="header-container glass-panel">
  <!-- Mobile Menu Button -->
  <button (click)="onMenuClick()" class="mobile-menu-toggle btn btn-secondary">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="menu-icon">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
  </button>

  <!-- Welcome / Title -->
  <div class="welcome-section" *ngIf="currentUser">
    <h2 class="welcome-title">Hola, {{ currentUser.name }} 👋</h2>
    <p class="welcome-subtitle">Bienvenido de vuelta al panel de control.</p>
  </div>

  <!-- Meta Info (Right side) -->
  <div class="header-meta">
    <!-- Status Badge -->
    <div class="status-badge glass-panel">
      <span class="pulse-dot"></span>
      <span class="status-text">Clínica Abierta</span>
    </div>

    <!-- Date Time -->
    <div class="date-badge glass-panel">
      <svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
      <!-- Verificamos el pipe personalizado aquí -->
      <span class="date-text">{{ today | dateFormat }}</span>
    </div>
  </div>
</header>
